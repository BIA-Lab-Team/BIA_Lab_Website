<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#0a1628"/>

  <!-- Subtle network lines -->
  <g stroke="#00c9a7" stroke-opacity="0.18" stroke-width="1.5" fill="none">
    <line x1="100" y1="100" x2="152" y2="58"/>
    <line x1="100" y1="100" x2="155" y2="138"/>
    <line x1="100" y1="100" x2="52"  y2="62"/>
    <line x1="100" y1="100" x2="48"  y2="138"/>
    <line x1="100" y1="100" x2="100" y2="38"/>
  </g>
  <g fill="#00c9a7" opacity="0.35">
    <circle cx="152" cy="58"  r="4"/>
    <circle cx="155" cy="138" r="4"/>
    <circle cx="52"  cy="62"  r="4"/>
    <circle cx="48"  cy="138" r="4"/>
    <circle cx="100" cy="38"  r="4"/>
  </g>

  <!-- BIA monogram -->
  <text
    x="100" y="122"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="62"
    letter-spacing="-2"
    fill="#00c9a7"
  >BIA</text>

  <!-- Thin teal ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#00c9a7" stroke-width="2" stroke-opacity="0.4"/>
</svg>
