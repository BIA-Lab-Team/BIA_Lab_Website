// ── Projection (equirectangular, clipped view) ──────────────────────────────
const VIEW = { minLon:-168, maxLon:175, minLat:-57, maxLat:83 };
const LP_W = 258; // left panel width + margins — map starts here

function project(lon, lat, W, H) {
  const effW = W - LP_W - 8;
  const x = LP_W + (lon - VIEW.minLon) / (VIEW.maxLon - VIEW.minLon) * effW;
  const y = (VIEW.maxLat - lat) / (VIEW.maxLat - VIEW.minLat) * H;
  return [x, y];
}

// ── Canvas setup ────────────────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const NAV_H = 62;

function mapW() { return window.innerWidth; }
function mapH() { return window.innerHeight - NAV_H; }

function resize() {
  const w = mapW(), h = mapH();
  cv.style.width  = w + 'px';
  cv.style.height = h + 'px';
  cv.width  = w * dpr;
  cv.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeNodes(w, h);
  draw();
}
window.addEventListener('resize', resize);

// ── Institution nodes ────────────────────────────────────────────────────────
let iNodes = [];

function computeNodes(W, H) {
  const nonHome = INSTITUTIONS.filter(i => !i.home);
  const maxP = Math.max(...nonHome.map(i => i.papers.length));
  iNodes = INSTITUTIONS.map(inst => {
    const [x, y] = project(inst.lon, inst.lat, W, H);
    const r = inst.home ? 14 : 7 + (inst.papers.length / maxP) * 8;
    return { ...inst, x, y, r };
  });
}

// ── Animation state ──────────────────────────────────────────────────────────
let animT    = 0;   // 0→1 intro progress (2s)
let lastTs   = null;
let rafId    = null;
let hoveredId  = null;
let selectedId = null;
let pulsePh  = 0;   // for home node ring pulse

function startAnim() {
  if (rafId) return;
  lastTs = null;
  rafId = requestAnimationFrame(loop);
}

function loop(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;
  animT = Math.min(1, animT + dt / 2.0);
  pulsePh += dt * 1.8;
  draw();
  // Keep looping for pulse; stop intro after animT=1 only if no hovered
  rafId = requestAnimationFrame(loop);
}

// ── Arc progress (staggered intro) ──────────────────────────────────────────
function arcAlpha(instIdx) {
  const collabs = INSTITUTIONS.filter(i => !i.home);
  const n = collabs.length;
  const step = 0.9 / n;
  const start = instIdx * step * 0.6;
  const end   = start + 0.4;
  return Math.max(0, Math.min(1, (animT - start) / Math.max(end - start, 0.01)));
}

// ── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  const W = mapW(), H = mapH();
  ctx.clearRect(0, 0, W, H);

  // Ocean background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080f1e');
  bg.addColorStop(1, '#060d1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Graticule (faint grid, every 30° lon, 20° lat)
  ctx.strokeStyle = 'rgba(72,120,190,0.055)';
  ctx.lineWidth = 0.5;
  for (let lon = -150; lon <= 180; lon += 30) {
    const [x0] = project(lon, VIEW.maxLat, W, H);
    const [x1, y1] = project(lon, VIEW.minLat, W, H);
    ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x1, y1); ctx.stroke();
  }
  for (let lat = -40; lat <= 80; lat += 20) {
    const [x0, y0] = project(VIEW.minLon, lat, W, H);
    const [x1, y1] = project(VIEW.maxLon, lat, W, H);
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
  }

  // Continent fills
  for (const ring of LAND) {
    ctx.beginPath();
    for (let i = 0; i < ring.length; i++) {
      const [x, y] = project(ring[i][0], ring[i][1], W, H);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = '#0f1c33';
    ctx.fill();
    ctx.strokeStyle = '#1a2f50';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Home node
  const home = iNodes.find(n => n.home);

  // Connection arcs from home to each collaborator
  let collabIdx = 0;
  for (const n of iNodes) {
    if (n.home) continue;
    const alpha = arcAlpha(collabIdx++);
    if (alpha <= 0) continue;

    const isHov = n.id === hoveredId;
    const isSel = n.id === selectedId;
    const fade  = (hoveredId || selectedId) ? (isHov || isSel ? 1 : 0.2) : 1;

    drawArc(home.x, home.y, n.x, n.y, alpha * 0.5 * fade, isHov || isSel);
  }

  // Collaborator nodes
  collabIdx = 0;
  for (const n of iNodes) {
    if (n.home) continue;
    const alpha = arcAlpha(collabIdx++);
    if (alpha <= 0) continue;
    const isHov = n.id === hoveredId;
    const isSel = n.id === selectedId;
    const fade  = (hoveredId || selectedId) ? (isHov || isSel ? 1 : 0.35) : 1;
    drawNode(n, alpha * fade, isHov, isSel);
  }

  // Home node (drawn last, always on top)
  if (home) drawHomeNode(home);
}

function drawArc(x1, y1, x2, y2, alpha, highlight) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const d  = Math.sqrt(dx * dx + dy * dy);
  const lift = Math.min(d * 0.35, 90);
  const cpX = mx + dy * 0.05;
  const cpY = my - lift;

  // Glow for highlighted
  if (highlight) {
    ctx.save();
    ctx.globalAlpha = alpha * 0.4;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cpX, cpY, x2, y2);
    ctx.strokeStyle = '#6fa3d4';
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cpX, cpY, x2, y2);
  ctx.strokeStyle = highlight ? 'rgba(111,163,212,0.9)' : 'rgba(72,120,190,0.7)';
  ctx.lineWidth = highlight ? 1.8 : 1.2;
  ctx.stroke();
  ctx.restore();
}

function drawNode(n, alpha, hov, sel) {
  const col = sel ? '#7ec8f0' : hov ? '#88d4f5' : '#4878be';
  const r = n.r;

  // Glow
  if (hov || sel) {
    const g = ctx.createRadialGradient(n.x, n.y, r * 0.3, n.x, n.y, r * 3.5);
    g.addColorStop(0, `rgba(72,163,222,${0.22 * alpha})`);
    g.addColorStop(1, 'rgba(72,120,190,0)');
    ctx.save(); ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(n.x, n.y, r * 3.5, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill(); ctx.restore();
  }

  ctx.save();
  ctx.globalAlpha = alpha;
  const fg = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, r * 0.05, n.x, n.y, r);
  fg.addColorStop(0, col); fg.addColorStop(1, '#2a5090');
  ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  ctx.fillStyle = fg; ctx.fill();
  ctx.strokeStyle = hov || sel ? 'rgba(111,163,212,0.9)' : 'rgba(72,120,190,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // Label
  if (hov || sel || n.papers.length >= 3) {
    ctx.save();
    ctx.globalAlpha = alpha * (hov || sel ? 1 : 0.7);
    ctx.font = `${hov || sel ? 600 : 500} 10px Inter, system-ui, sans-serif`;
    ctx.fillStyle = hov || sel ? '#d4e4f4' : '#7a9ab8';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(n.abbr, n.x, n.y + r + 4);
    ctx.restore();
  }
}

function drawHomeNode(n) {
  const pulse = Math.sin(pulsePh) * 0.5 + 0.5;
  const r = n.r;

  // Outer pulsing ring
  const ringR = r + 8 + pulse * 6;
  ctx.save();
  ctx.globalAlpha = 0.25 * (1 - pulse * 0.5);
  ctx.beginPath(); ctx.arc(n.x, n.y, ringR, 0, Math.PI * 2);
  ctx.strokeStyle = '#f0b429'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  // Glow halo
  const g = ctx.createRadialGradient(n.x, n.y, r * 0.2, n.x, n.y, r * 3.5);
  g.addColorStop(0, 'rgba(240,180,41,0.3)');
  g.addColorStop(1, 'rgba(240,180,41,0)');
  ctx.beginPath(); ctx.arc(n.x, n.y, r * 3.5, 0, Math.PI * 2);
  ctx.fillStyle = g; ctx.fill();

  // Node fill
  const fg = ctx.createRadialGradient(n.x - r * 0.3, n.y - r * 0.3, r * 0.1, n.x, n.y, r);
  fg.addColorStop(0, '#ffd166');
  fg.addColorStop(1, '#c07a00');
  ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  ctx.fillStyle = fg; ctx.fill();
  ctx.strokeStyle = 'rgba(240,180,41,0.8)'; ctx.lineWidth = 2; ctx.stroke();

  // Label
  ctx.font = '600 10px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#f0b429';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('BIA Lab', n.x, n.y + r + 5);
}

// ── Mouse interaction ────────────────────────────────────────────────────────
const tt    = document.getElementById('tt');
const ttName = document.getElementById('tt-name');
const ttCity = document.getElementById('tt-city');
const ttCnt  = document.getElementById('tt-count');

cv.addEventListener('mousemove', e => {
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let hit = null;
  for (const n of iNodes) {
    const dx = mx - n.x, dy = my - n.y;
    if (Math.sqrt(dx*dx + dy*dy) <= Math.max(n.r + 8, 18)) { hit = n; break; }
  }
  const newHov = hit ? hit.id : null;
  if (newHov !== hoveredId) {
    hoveredId = newHov;
    updateInstList();
  }
  if (hit && !hit.home) {
    ttName.textContent = hit.name;
    ttCity.textContent = `${hit.flag}  ${hit.city}, ${hit.country}`;
    ttCnt.textContent  = `${hit.papers.length} shared paper${hit.papers.length !== 1 ? 's' : ''}`;
    tt.style.display = 'block';
    const ttW = 220, ttH = 80;
    tt.style.left = Math.min(e.clientX + 14, window.innerWidth - ttW - 10) + 'px';
    tt.style.top  = Math.min(e.clientY - 10, window.innerHeight - ttH - 10) + 'px';
    cv.style.cursor = 'pointer';
  } else {
    tt.style.display = 'none';
    cv.style.cursor = hit ? 'default' : 'crosshair';
  }
});

cv.addEventListener('mouseleave', () => {
  tt.style.display = 'none';
  hoveredId = null;
  updateInstList();
});

cv.addEventListener('click', e => {
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let hit = null;
  for (const n of iNodes) {
    const dx = mx - n.x, dy = my - n.y;
    if (Math.sqrt(dx*dx + dy*dy) <= Math.max(n.r + 8, 18) && !n.home) { hit = n; break; }
  }
  selectInst(hit ? hit.id : null);
});

function selectInst(id) {
  selectedId = id;
  updateInstList();
  renderRightPanel();
}

// ── Left panel ───────────────────────────────────────────────────────────────
function buildUI() {
  // Stats
  const countries = new Set(INSTITUTIONS.map(i => i.country)).size;
  const totalPapers = new Set(INSTITUTIONS.flatMap(i => i.papers)).size;
  const collabInsts = INSTITUTIONS.filter(i => !i.home).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat__n">${collabInsts}</div><div class="stat__l">institutions</div></div>
    <div class="stat"><div class="stat__n">${countries}</div><div class="stat__l">countries</div></div>
    <div class="stat"><div class="stat__n">${totalPapers}</div><div class="stat__l">papers</div></div>
  `;
  buildInstList();
}

const SORTED_INSTS = [...INSTITUTIONS].sort((a, b) => {
  if (a.home) return -1; if (b.home) return 1;
  return b.papers.length - a.papers.length;
});

function buildInstList() {
  document.getElementById('inst-list').innerHTML = SORTED_INSTS.map(inst => `
    <div class="inst-row ${inst.home ? 'home-row' : ''}"
         data-id="${inst.id}">
      <span class="inst-flag">${inst.flag}</span>
      <span class="inst-name">${inst.home ? 'BIA Lab · Vanderbilt' : inst.abbr}</span>
      <span class="inst-count">${inst.papers.length}</span>
    </div>`).join('');

  const list = document.getElementById('inst-list');
  list.addEventListener('click', e => {
    const row = e.target.closest('.inst-row');
    if (!row || row.dataset.id === 'vanderbilt') return;
    selectInst(selectedId === row.dataset.id ? null : row.dataset.id);
  });
  list.addEventListener('mouseover', e => {
    const row = e.target.closest('.inst-row');
    if (!row || row.dataset.id === 'vanderbilt') return;
    hoveredId = row.dataset.id;
    syncInstClasses();
  });
  list.addEventListener('mouseleave', () => {
    hoveredId = null;
    syncInstClasses();
  });
}

function syncInstClasses() {
  document.querySelectorAll('.inst-row').forEach(row => {
    row.classList.toggle('active', row.dataset.id === selectedId);
  });
}

function updateInstList() { syncInstClasses(); }

// ── Right panel ───────────────────────────────────────────────────────────────
const rp = document.getElementById('rp');

function renderRightPanel() {
  if (!selectedId) { rp.classList.remove('open'); return; }
  const inst = INSTITUTIONS.find(i => i.id === selectedId);
  if (!inst) { rp.classList.remove('open'); return; }

  const paperRows = inst.papers.map(pid => {
    const p = PAPERS[pid];
    if (!p) return '';
    const col = CAT_COL[p.c] || '#7a9ab2';
    return `
      <div class="paper-row">
        <div class="paper-row__top">
          <span class="year-badge">${p.y}</span>
          <span class="cat-chip" style="background:${col}22;color:${col}">${p.c}</span>
        </div>
        <div class="paper-row__title">${p.f}</div>
      </div>`;
  }).join('');

  document.getElementById('rp-content').innerHTML = `
    <div class="rp-header">
      <div class="rp-title">${inst.name}</div>
      <button class="rp-close" onclick="selectInst(null)">✕</button>
    </div>
    <div class="rp-meta">${inst.flag} &thinsp;${inst.city} · ${inst.country}</div>
    ${inst.collab ? `<div class="rp-collab">${inst.collab}</div>` : ''}
    <hr class="rp-divider">
    <div class="plabel" style="margin-bottom:8px">${inst.papers.length} paper${inst.papers.length!==1?'s':''}</div>
    ${paperRows}
  `;
  rp.classList.add('open');
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildUI();
resize();
startAnim();
</script>
</body>
</html>
