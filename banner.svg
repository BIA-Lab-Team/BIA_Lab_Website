  <text x="125" y="179" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="1.8" fill="#4878be">OBSERVE</text>
  <text x="125" y="193" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="8.5" fill="#506888">live-cell imaging</text>
  <g transform="translate(314,116)">
