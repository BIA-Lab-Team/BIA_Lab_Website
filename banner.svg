<svg viewBox="0 0 820 205" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BIA Lab mission schematic: Observe → Measure → Model → Design</title>
  <desc>Four-stage pipeline showing the lab's approach: observe cells via live imaging, measure with quantitative phenomics, build computational models, and achieve designable biology.</desc>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <path d="M0,0.5 L6,3.5 L0,6.5 L1.8,3.5 Z" fill="#2a4070"/>
    </marker>
  </defs>
  <rect width="820" height="205" rx="10" fill="#0b1220"/>
  <rect width="820" height="205" rx="10" fill="none" stroke="#1a2d50" stroke-width="1"/>
  <text x="410" y="28" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="700" letter-spacing="2.5" fill="#4878be" opacity="0.9">BIOLOGICAL INFORMATION ARCHITECTURE LAB</text>
  <text x="410" y="49" text-anchor="middle" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="13.5" fill="#a8c0e0" letter-spacing="0.2">making biological signalling designable</text>
  <line x1="60" y1="62" x2="760" y2="62" stroke="#1e3058" stroke-width="0.8"/>
