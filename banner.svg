  <line x1="367" y1="116" x2="450" y2="116" stroke="#2a4070" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="556" y1="116" x2="634" y2="116" stroke="#2a4070" stroke-width="1.5" marker-end="url(#arr)"/>
  <g transform="translate(125,116)">
    <circle r="48" fill="#4878be" opacity="0.07"/>
    <circle r="46" fill="none" stroke="#4878be" stroke-width="1.2" opacity="0.65"/>
    <circle r="20" fill="#4878be" opacity="0.1" stroke="#4878be" stroke-width="1.3"/>
    <circle r="8" fill="#4878be" opacity="0.55"/>
    <circle cx="0"   cy="-27" r="2.5" fill="#4878be" opacity="0.9"/>
